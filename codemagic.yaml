workflows:
  ios-release:
    name: Zyiarah iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Zyiarah Key
    environment:
      flutter: stable
      xcode: latest
      vars:
        APP_STORE_APP_ID: "6760955777"
    scripts:
      - name: Initialize keychain
        script: keychain initialize
      - name: Revoke existing distribution certificates
        script: |
          CERT_IDS=$(app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>/dev/null \
            | python3 -c "import sys,json; print(' '.join(c['id'] for c in json.load(sys.stdin)))" 2>/dev/null || true)
          if [ -n "$CERT_IDS" ]; then
            for cid in $CERT_IDS; do
              app-store-connect certificates revoke "$cid" || true
            done
          fi
      - name: Create distribution certificate
        script: |
          app-store-connect certificates create --type IOS_DISTRIBUTION
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.zyiarah.zyiarah \
            --type IOS_APP_STORE \
            --create
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Install Pods
        script: cd ios && pod install
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: true
