workflows:
  ios-workflow:
    name: Zyiarah iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: default
      xcode: latest
      cocoapods: default
      groups:
        - appstore_credentials # Add your App Store Connect API Key here in Codemagic UI
    scripts:
      - name: Get Flutter Packages
        script: |
          flutter packages pub get
      - name: Install Pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: iOS Build
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - support@zyiarah.com # Update to the user's email
        notify:
          success: true
          failure: false
