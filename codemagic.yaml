workflows:
  android-workflow:
    name: Zyiarah Android Build
    max_build_duration: 60
    environment:
      flutter: default
      xcode: latest
      cocoapods: default
      java: 17
      groups:
        - google_play_credentials # Add your Google Play JSON credentials here in Codemagic UI
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      - name: Get Flutter Packages
        script: |
          flutter packages pub get
      - name: Build Android APK
        script: |
          flutter build apk --release --split-per-abi
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/app-*release.apk
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/mapping/release/mapping.txt
    publishing:
      email:
        recipients:
          - support@zyiarah.com # Update to the user's email
        notify:
          success: true
          failure: false
      google_play:
        credentials: $GCP_CREDENTIALS # Secret variable from Codemagic UI
        track: internal # or 'production', 'alpha', 'beta'
        submit_as_draft: true
