workflows:
  ios-release:
    name: Zyiarah iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Zyiarah Key
    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: "com.zyiarah.zyiarah"
        APP_STORE_APP_ID: "6760955777"
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Install Pods
        script: cd ios && pod install
      - name: Initialize keychain
        script: keychain initialize
      - name: Revoke stale distribution certificates
        script: |
          CERT_IDS=$(app-store-connect certificates list --type IOS_DISTRIBUTION --json \
            | python3 -c "import sys,json; print(' '.join(c['id'] for c in json.load(sys.stdin)))" 2>/dev/null || true)
          if [ -n "$CERT_IDS" ]; then
            echo "Revoking: $CERT_IDS"
            app-store-connect certificates revoke $CERT_IDS
          else
            echo "No certificates to revoke"
          fi
      - name: Fetch or create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up Xcode code signing
        script: xcode-project use-profiles
      - name: Flutter build IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: true
