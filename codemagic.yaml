workflows:
  ios-workflow:
    name: Zyiarah iOS Build & TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      flutter: default
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.zyiarah.zyiarah"
        TEAM_ID: "RPTPMXA436"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "RJMPC4734X"
        APP_STORE_CONNECT_ISSUER_ID: "6dd67287-cfcd-40fc-a3db-8bf378a1ac8f"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get Flutter Packages & Pod Install
        script: |
          set -e
          
          # Fetch Packages (Generates Generated.xcconfig implicitly, sometimes missing in CI)
          flutter pub get
          
          # Create a dummy Generated.xcconfig if missing or create the correct structure
          mkdir -p ios/Flutter
          cat <<EOF > ios/Flutter/Generated.xcconfig
          // This is a generated file; do not edit or check into version control.
          FLUTTER_ROOT=$FLUTTER_ROOT
          FLUTTER_APPLICATION_PATH=$CM_BUILD_DIR
          COCOAPODS_PARALLEL_CODE_SIGN=true
          FLUTTER_BUILD_DIR=build
          FLUTTER_BUILD_NAME=1.0.0
          FLUTTER_BUILD_NUMBER=8
          EXCLUDED_ARCHS[sdk=iphonesimulator*]=i386
          EXCLUDED_ARCHS[sdk=iphoneos*]=armv7
          DART_OBFUSCATION=false
          TRACK_WIDGET_CREATION=true
          TREE_SHAKE_ICONS=false
          PACKAGE_CONFIG=.dart_tool/package_config.json
          EOF
          
          # Clean and reinstall Pods
          cd ios 
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Setup Code Signing
        script: |
          set -e

          # Create isolated keychain
          security create-keychain -p "BuildKeychain123!" build.keychain-db
          security default-keychain -s build.keychain-db
          security unlock-keychain -p "BuildKeychain123!" build.keychain-db
          security set-keychain-settings -t 3600 -u build.keychain-db
          security list-keychains -d user -s build.keychain-db login.keychain-db

          # Import distribution certificate
          echo "CM_CERTIFICATE_PASSWORD contains ${#CM_CERTIFICATE_PASSWORD} characters"
          security import ios/zyiarah_dist_cert.p12 -k build.keychain-db -P "$CM_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "BuildKeychain123!" build.keychain-db

          # Import Apple WWDR certificates for trust chain
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o AppleWWDRCAG3.cer
          security import AppleWWDRCAG3.cer -k build.keychain-db -T /usr/bin/codesign
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG4.cer -o AppleWWDRCAG4.cer
          security import AppleWWDRCAG4.cer -k build.keychain-db -T /usr/bin/codesign

          # Install provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          # Get UUID from the provisioning profile
          PROFILE_UUID=$(security cms -D -i ios/Zyiarah_App_Store_Profile.mobileprovision 2>/dev/null | plutil -extract UUID raw -)
          echo "Profile UUID: $PROFILE_UUID"

          # Copy with UUID as filename (required by Xcode)
          cp ios/Zyiarah_App_Store_Profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "=== Provisioning Profiles ==="
          ls -l "$HOME/Library/MobileDevice/Provisioning Profiles/"

          echo "=== Profile Content (Certs) ==="
          security cms -D -i ios/Zyiarah_App_Store_Profile.mobileprovision | grep -A 10 "DeveloperCertificates" || true

      - name: Generate Export Options
        script: |
          # Extract provisioning profile UUID
          PROFILE_UUID=$(security cms -D -i ios/Zyiarah_App_Store_Profile.mobileprovision 2>/dev/null | plutil -extract UUID raw -)

          cat <<EOF > export_options.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          echo "=== Export Options ==="
          cat export_options.plist

      - name: Build IPA
        script: |
          set -e
          echo "MAPBOX_TOKEN=${MAPBOX_TOKEN:-pk.eyJ1IjoiZXJpaGRldiIsImEiOiJjbW1jbGZpcnIwNzh4MnJzaXcyM3I3dG1jIn0.Hqs-3sGgQCsGK0yHamvdug}" > .env
          security unlock-keychain -p "BuildKeychain123!" build.keychain-db || true
          
          # Extract profile UUID locally so it's available in this script block
          PROFILE_UUID=$(security cms -D -i ios/Zyiarah_App_Store_Profile.mobileprovision 2>/dev/null | plutil -extract UUID raw -)
          echo "Using Profile UUID: $PROFILE_UUID"

          # 1. Build iOS without signing
          flutter build ios --release --no-codesign
          
          # 2. Archive with explicit signing overrides
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            CODE_SIGN_STYLE=Manual \
            archive
          
          # 3. Export IPA using export_options.plist
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist export_options.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - build/ios/archive/Runner.xcarchive/Products/Applications/*.app

    publishing:
      email:
        recipients:
          - erihdev@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        submit_to_testflight: true
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        beta_groups:
          - Internal Testers
