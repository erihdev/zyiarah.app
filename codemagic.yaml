workflows:
  ios-workflow:
    name: Zyiarah iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: default
      xcode: latest
      cocoapods: default
      groups:
        - appstore_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zyiarah.zyiarah
    scripts:
      - name: Get Flutter Packages
        script: |
          flutter packages pub get
      - name: Install Pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: iOS Build
        script: |
          flutter build ipa --release --export-options-plist=$CM_EXPORT_OPTIONS
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - support@zyiarah.com
        notify:
          success: true
          failure: false
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

