workflows:
  ios-workflow:
    name: Zyiarah iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: default
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter Packages
        script: |
          flutter packages pub get
      - name: Install Pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Setup Code Signing
        script: |
          keychain initialize
          security import ios/zyiarah_dist_cert.p12 -k /Users/builder/Library/Keychains/build.keychain-db -P "dxqiAR0S" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" /Users/builder/Library/Keychains/build.keychain-db
          export APP_STORE_CONNECT_API_KEY_KEY_ID="RJMPC4734X"
          export APP_STORE_CONNECT_API_KEY_ISSUER_ID="6dd67287-cfcd-40fc-a3db-8bf378a1ac8f"
          export APP_STORE_CONNECT_API_KEY_KEY="$(cat ios/AuthKey_RJMPC4734X.p8 | tr -d '\r')"
          fastlane sigh --app_identifier "com.zyiarah.zyiarah" --force
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp AppStore_com.zyiarah.zyiarah.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/"
      - name: Force Xcode Distribution (Ruby)
        script: |
          ruby -e "require 'xcodeproj'; project = Xcodeproj::Project.open('ios/Runner.xcodeproj'); project.targets.each do |target| target.build_configurations.each do |config| config.build_settings['CODE_SIGN_STYLE'] = 'Manual'; config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'; config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''; end; end; project.save"
      - name: Generate Export Options
        script: |
          cat <<EOF > export_options.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>RPTPMXA436</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
      - name: iOS Build
        script: |
          flutter build ipa --release --export-options-plist=export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - support@zyiarah.com
        notify:
          success: true
          failure: false
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

