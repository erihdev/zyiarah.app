workflows:
  ios-release:
    name: Zyiarah iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Zyiarah Key
    environment:
      flutter: stable
      xcode: latest
      vars:
        APP_STORE_APP_ID: "6760955777"
    scripts:
      - name: Initialize keychain
        script: keychain initialize
      - name: Revoke existing distribution certificates
        script: |
          echo "=== Listing IOS_DISTRIBUTION certificates ==="
          CERT_JSON=$(app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>&1 || echo "[]")
          echo "Raw: $CERT_JSON"
          CERT_IDS=$(echo "$CERT_JSON" | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    ids = ' '.join(str(c['id']) for c in data)
    print(ids)
except Exception as e:
    import sys as s; print(f'Parse error: {e}', file=s.stderr)
" 2>/dev/null || echo "")
          echo "IDs to revoke: [$CERT_IDS]"
          if [ -n "$CERT_IDS" ]; then
            for cid in $CERT_IDS; do
              echo "Revoking: $cid"
              app-store-connect certificates revoke "$cid" && echo "Revoked OK" || echo "Revoke failed for $cid"
            done
          else
            echo "No certificates found — manual revoke may be needed at developer.apple.com"
          fi
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.zyiarah.zyiarah \
            --type IOS_APP_STORE \
            --create
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Install Pods
        script: cd ios && pod install
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: true
