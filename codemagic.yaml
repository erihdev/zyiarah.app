workflows:
  ios-release:
    name: Zyiarah iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Zyiarah Key
    environment:
      flutter: stable
      xcode: latest
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.zyiarah.zyiarah"
        APP_STORE_APP_ID: "6760955777"
    scripts:
      - name: Create .env file
        script: |
          echo "MAPBOX_TOKEN=$MAPBOX_TOKEN" > .env
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Install Pods
        script: cd ios && pod install
      - name: Initialize keychain
        script: keychain initialize
      - name: Revoke existing distribution certificates
        script: |
          echo "=== Fetching all certificates from App Store Connect ==="
          app-store-connect certificates list --json > /tmp/all_certs.json 2>/dev/null
          echo "Raw response:"
          cat /tmp/all_certs.json
          echo ""
          echo "=== Revoking any distribution certificates ==="
          python3 << 'PYEOF'
          import json, subprocess, sys
          try:
              with open('/tmp/all_certs.json') as f:
                  content = f.read()
              certs = json.loads(content)
              revoked = 0
              for c in certs:
                  # Apple API format: certificateType is inside attributes{}
                  attrs = c.get('attributes', {})
                  ct = attrs.get('certificateType', '')
                  cid = c.get('id', '')
                  print(f'  Cert: type={ct}, id={cid}')
                  if cid:  # revoke any cert that has an id
                      result = subprocess.run(
                          ['app-store-connect', 'certificates', 'delete', cid],
                          capture_output=True, text=True
                      )
                      if result.returncode == 0:
                          revoked += 1
                          print(f'  ✓ Deleted {cid}')
                      else:
                          print(f'  ✗ Failed to delete {cid}: {result.stderr}')
              print(f'  Total revoked: {revoked}')
          except Exception as e:
              print(f'Error parsing certs: {e}', file=sys.stderr)
          PYEOF
          sleep 10
      - name: Generate certificate private key
        script: |
          openssl genrsa 2048 > /tmp/private.key
          echo "CERTIFICATE_PRIVATE_KEY<<EOF" >> $CM_ENV
          cat /tmp/private.key >> $CM_ENV
          echo "EOF" >> $CM_ENV
      - name: Fetch or create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/private.key \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up Xcode code signing
        script: xcode-project use-profiles
      - name: Cancel existing App Store review submissions
        ignore_failure: true
        script: |
          python3 << 'PYEOF'
          import jwt, time, requests, os, json, tempfile, subprocess
          ISSUER_ID = "6dd67287-cfcd-40fc-a3db-8bf378a1ac8f"
          KEY_ID = "RJMPC4734X"
          APP_ID = os.environ.get("APP_STORE_APP_ID", "6760955777")
          BASE_URL = "https://api.appstoreconnect.apple.com/v1"
          # Write key to temp file to avoid env var formatting issues
          raw_key = os.environ.get("APP_STORE_CONNECT_PRIVATE_KEY", "")
          raw_key = raw_key.replace("\\n", "\n")
          with tempfile.NamedTemporaryFile(mode="w", suffix=".p8", delete=False) as f:
              f.write(raw_key)
              key_path = f.name
          with open(key_path) as f:
              private_key = f.read()
          def make_token():
              payload = {"iss": ISSUER_ID, "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"}
              return jwt.encode(payload, private_key, algorithm="ES256", headers={"kid": KEY_ID})
          def hdrs():
              return {"Authorization": f"Bearer {make_token()}", "Content-Type": "application/json"}
          r = requests.get(f"{BASE_URL}/apps/{APP_ID}/reviewSubmissions", headers=hdrs(), params={"limit": 20})
          submissions = r.json().get("data", [])
          print(f"Found {len(submissions)} existing submissions")
          open_states = {"WAITING_FOR_REVIEW", "IN_REVIEW", "READY_FOR_REVIEW", "UNRESOLVED_ISSUES"}
          for s in submissions:
              sid = s["id"]
              state = s.get("attributes", {}).get("state", "")
              print(f"  {sid}: state={state}")
              if state in open_states:
                  r2 = requests.post(f"{BASE_URL}/reviewSubmissions/{sid}/actions/cancel", headers=hdrs(), json={})
                  print(f"    cancel action => {r2.status_code}")
                  if not r2.ok:
                      r3 = requests.patch(f"{BASE_URL}/reviewSubmissions/{sid}", headers=hdrs(), json={
                          "data": {"type": "reviewSubmissions", "id": sid, "attributes": {"submitted": False}}
                      })
                      print(f"    patch cancel => {r3.status_code}: {r3.text[:150]}")
                  time.sleep(3)
          print("Waiting 8s for Apple to process...")
          time.sleep(8)
          # Reset INVALID_BINARY version state by verifying current state
          r4 = requests.get(f"{BASE_URL}/apps/{APP_ID}/appStoreVersions", headers=hdrs(), params={
              "filter[platform]": "IOS", "limit": 5,
              "fields[appStoreVersions]": "versionString,appStoreState"
          })
          for v in r4.json().get("data", []):
              print(f"  Version {v['attributes']['versionString']}: {v['attributes']['appStoreState']}")
          PYEOF
      - name: Flutter build IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
