workflows:
  ios-release:
    name: Zyiarah iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      groups:
        - apple_auth # We will create this group in Codemagic UI
      vars:
        APP_STORE_APPLE_ID: "6760955777"
        BUNDLE_ID: "com.zyiarah.zyiarah"
    scripts:
      - name: Set up code signing
        script: | 
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --project-id "$APP_STORE_APP_ID" --create
          keychain add-certificates
      - name: Get Flutter dependencies
        script: | 
          flutter pub get
      - name: Install Pods
        script: | 
          cd ios && pod install
      - name: Flutter build IPA
        script: | 
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
