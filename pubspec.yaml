name: zyiarah
description: "A new Flutter project."
publish_to: "none"

version: 1.2.0+31

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  geolocator: ^13.0.2
  latlong2: ^0.9.1
  google_fonts: ^6.2.1
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.3
  flutter_map: ^7.0.2
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1
  firebase_storage: ^12.4.0
  pdf: ^3.11.1
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.1
  qr_flutter: ^4.1.0
  http: ^1.3.0
  flutter_dotenv: ^6.0.0
  intl: ^0.18.1
  edfapg_sdk: ^2.0.10+1
  signature: ^5.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.6.0
  cloud_functions: ^5.3.5
  image_picker: ^1.2.1
  table_calendar: ^3.0.9
  printing: ^5.14.3
  app_links: ^7.0.0
  fl_chart: ^1.2.0
  cached_network_image: ^3.4.1
  go_router: ^17.2.0
  provider: ^6.1.5+1
  arabic_reshaper: ^0.0.1
  bidi: ^2.0.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/logo.png
    - assets/images/hourly_cleaning.png
    - assets/images/monthly_cleaning.png
    - assets/images/sofa_cleaning.png
    - assets/images/company_cleaning.png
    - assets/images/store.png
    - assets/apple_pay_config.json

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
