    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "flutter"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]

  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "functions"]

  - package-ecosystem: "npm"
    directory: "/admin_panel"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "admin"]
